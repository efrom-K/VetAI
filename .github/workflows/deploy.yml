name: VetAI CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and Restart
        run: |
          docker-compose build
          docker-compose up -d
          
      - name: Cleanup
        run: docker image prune -f 